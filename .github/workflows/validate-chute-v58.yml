name: Validate Chute Mundo v5.13.0

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate syntax and audit
        run: |
          npm run check:official
          node --check public/chute-v511-assets.mjs
          node --check public/chute-v511-core.mjs
          node --check public/chute-v511-tournaments.mjs
          node --check public/chute-v511-match-share.mjs
          node --check public/chute-v5121-storage-preflight.mjs
          node --check public/chute-v512-integrity.mjs
          node --check public/chute-v5121-search-fix.mjs
          node --check public/chute-v5121-backup-fix.mjs
          node --check public/chute-v513-lineups.mjs
          node --check public/sw.js
          node --check scripts/smoke-chute-v512.mjs
          node --check scripts/smoke-chute-v5121.mjs
          node --check scripts/smoke-chute-v513.mjs
          node scripts/audit-chute-v58.mjs
      - name: Validate required files
        run: |
          test -s public/manifest.webmanifest
          test -s public/chute-icon.svg
          test -s public/chute-icon-maskable.svg
          test -s public/sw.js
          test -s public/chute-v511.css
          test -s public/chute-v511-core.mjs
          test -s public/chute-v511-tournaments.mjs
          test -s public/chute-v511-match-share.mjs
          test -s public/chute-v512-integrity.mjs
          test -s public/chute-v5121-storage-preflight.mjs
          test -s public/chute-v5121-search-fix.mjs
          test -s public/chute-v5121-backup-fix.mjs
          test -s public/chute-v513-lineups.mjs
          test -s public/chute-v513-lineups.css
          test -s scripts/smoke-chute-v513.mjs
          grep -q "playerKey" public/chute-v511-core.mjs
          grep -q "leaguePodium" public/chute-v511-tournaments.mjs
          grep -q "compactBackups" public/chute-v5121-backup-fix.mjs
          grep -q "chute-v513-lineups.mjs" public/chute-official.mjs
          grep -q "registerSubstitution" public/chute-v513-lineups.mjs
          grep -q '"display":"standalone"' public/manifest.webmanifest
          test ! -e public/chute-v56-card-metadata.mjs
      - name: Install browser
        run: |
          npm install --no-save serve@14.2.4 playwright@1.52.0
          npx playwright install --with-deps chromium
      - name: Run browser smoke
        run: |
          npx serve public -l 4173 --no-clipboard > /tmp/chute-server.log 2>&1 &
          sleep 3
          node scripts/smoke-chute-v58.mjs > /tmp/chute-smoke-v58.log 2>&1
          node scripts/smoke-chute-v59.mjs > /tmp/chute-smoke-v59.log 2>&1
          node scripts/smoke-chute-v591.mjs > /tmp/chute-smoke-v591.log 2>&1
          node scripts/smoke-chute-v510.mjs > /tmp/chute-smoke-v510.log 2>&1
          node scripts/smoke-chute-v512.mjs > /tmp/chute-smoke-v512.log 2>&1
          node scripts/smoke-chute-v5121.mjs > /tmp/chute-smoke-v5121.log 2>&1
          node scripts/smoke-chute-v513.mjs > /tmp/chute-smoke-v513.log 2>&1
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chute-v5-13-0-diagnostics
          path: |
            /tmp/chute-smoke-v58.log
            /tmp/chute-smoke-v59.log
            /tmp/chute-smoke-v591.log
            /tmp/chute-smoke-v510.log
            /tmp/chute-smoke-v512.log
            /tmp/chute-smoke-v5121.log
            /tmp/chute-smoke-v513.log
            /tmp/chute-server.log
          retention-days: 3
