name: Validate Chute Mundo v5.10

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate syntax and audit
        run: |
          npm run check:official
          node scripts/audit-chute-v58.mjs
      - name: Validate required files
        run: |
          test -s public/chute-runtime-v58.mjs
          test -s public/chute-v58-analysis.mjs
          test -s public/chute-v58-visibility.mjs
          test -s public/chute-v59-live-profiles.css
          test -s public/chute-v591-live-access.mjs
          test -s public/chute-v510-dashboard.mjs
          test -s public/chute-v510-safety.mjs
          test -s public/chute-v510-safety-part-00.txt
          test -s public/chute-v510-safety-part-01.txt
          test -s public/chute-v510-safety-part-02.txt
          test -s public/chute-v510-safety-part-03.txt
          test -s public/chute-v510.css
          test -s scripts/smoke-chute-v510.mjs
          grep -q "Evolución del Ranking FIFA Chute" public/chute-v58-analysis.mjs
          cat public/chute-v59-part-{00,01,02,03,04,05,06,07}.txt > /tmp/chute-v59-source.mjs
          grep -q "CENTRO DE PARTIDO" /tmp/chute-v59-source.mjs
          grep -q "cm-v591-live-access" public/chute-v591-live-access.mjs
          grep -q "CENTRO DE JORNADA" public/chute-v510-dashboard.mjs
          cat public/chute-v510-safety-part-{00,01,02,03}.txt > /tmp/chute-v510-safety-source.mjs
          grep -q "PAPELERA DE TORNEOS" /tmp/chute-v510-safety-source.mjs
          grep -q "moveTournamentToTrashState" /tmp/chute-v510-safety-source.mjs
          grep -q "chute-v510-safety-part" public/chute-v510-safety.mjs
          grep -q "chute-v510-safety.mjs" public/chute-official.mjs
          grep -q "chute-v510-dashboard.mjs" public/chute-official.mjs
          test ! -e public/chute-v56-card-metadata.mjs
      - name: Install browser
        run: |
          npm install --no-save serve@14.2.4 playwright@1.52.0
          npx playwright install --with-deps chromium
      - name: Run browser smoke
        run: |
          npx serve public -l 4173 --no-clipboard > /tmp/chute-server.log 2>&1 &
          sleep 3
          node scripts/smoke-chute-v58.mjs > /tmp/chute-smoke-v58.log 2>&1
          node scripts/smoke-chute-v59.mjs > /tmp/chute-smoke-v59.log 2>&1
          node scripts/smoke-chute-v591.mjs > /tmp/chute-smoke-v591.log 2>&1
          node scripts/smoke-chute-v510.mjs > /tmp/chute-smoke-v510.log 2>&1
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chute-v5-10-diagnostics
          path: |
            /tmp/chute-smoke-v58.log
            /tmp/chute-smoke-v59.log
            /tmp/chute-smoke-v591.log
            /tmp/chute-smoke-v510.log
            /tmp/chute-server.log
          retention-days: 3