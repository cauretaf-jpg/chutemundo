name: Validate Chute Mundo v5.22

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate all public syntax and architecture
        run: |
          set -o pipefail
          npm run check:official
          while IFS= read -r file; do node --check "$file"; done < <(find public -type f \( -name '*.mjs' -o -name '*.js' \) | sort)
          node --check scripts/audit-chute-v522.mjs
          node --check scripts/smoke-chute-v522.mjs
          node --check scripts/smoke-chute-v516.mjs
          node --check scripts/smoke-chute-v517.mjs
          node scripts/check-chute-v516.mjs 2>&1 | tee /tmp/chute-v516-syntax.log
          cat public/chute-v517-finalization-part-*.txt > /tmp/chute-v517-concatenated.mjs
          node --check /tmp/chute-v517-concatenated.mjs 2>&1 | tee /tmp/chute-v517-syntax.log
          cat public/chute-v521-history-part-*.txt > /tmp/chute-v521-concatenated.mjs
          node --check /tmp/chute-v521-concatenated.mjs 2>&1 | tee /tmp/chute-v521-syntax.log
          cat public/chute-v518-era-stats-part-*.txt > /tmp/chute-v518-archive.mjs
          node --check /tmp/chute-v518-archive.mjs 2>&1 | tee /tmp/chute-v518-archive-syntax.log
          node scripts/audit-chute-v522.mjs

      - name: Validate required files and active imports
        run: |
          test -s public/index.html
          test -s public/manifest.webmanifest
          test -s public/sw.js
          test -s public/chute-bootstrap.mjs
          test -s public/chute-official.mjs
          test -s public/chute-detail.mjs
          test -s public/chute-v513-lineups.mjs
          test -s public/chute-v514-unified-match.mjs
          test -s public/chute-v515-match-center.mjs
          test -s public/chute-v516-events-stats.mjs
          test -s public/chute-v5162-playoff-seeding.mjs
          test -s public/chute-v517-finalization.mjs
          test -s public/chute-v517-finalization.css
          test -s public/chute-v521-history.mjs
          test -s public/chute-v521-history.css
          test -s public/chute-v521-history-sync.mjs
          test -s public/chute-v522-stats-refinement.mjs
          test -s public/chute-v522-stats-refinement.css
          test -s public/chute-v520-stats-guard.mjs
          test -s scripts/audit-chute-v522.mjs
          test -s scripts/smoke-chute-v522.mjs
          test -s scripts/smoke-chute-v516.mjs
          test -s scripts/smoke-chute-v517.mjs
          for index in $(seq 0 11); do part=$(printf "%02d" "$index"); test -s "public/chute-v516-events-stats-part-${part}.txt"; done
          for index in $(seq 0 7); do part=$(printf "%02d" "$index"); test -s "public/chute-v517-finalization-part-${part}.txt"; done
          for index in $(seq 0 9); do part=$(printf "%02d" "$index"); test -s "public/chute-v521-history-part-${part}.txt"; done
          head -n 1 public/chute-official.mjs | grep -q "chute-bootstrap.mjs?v=5.22.0"
          grep -q "chute-v521-history.mjs?v=5.22.0" public/chute-official.mjs
          grep -q "chute-v521-history-sync.mjs?v=5.22.0" public/chute-official.mjs
          grep -q "chute-v522-stats-refinement.mjs?v=5.22.0" public/chute-official.mjs
          grep -q "chute-v520-stats-guard.mjs?v=5.22.0" public/chute-official.mjs
          grep -q "chute:boot-complete" public/chute-official.mjs
          ! grep -q "chute-v520-stats.mjs" public/chute-official.mjs
          ! grep -q "chute-v520-stats-sync.mjs" public/chute-official.mjs
          ! grep -q "chute-v58-analysis.mjs" public/chute-official.mjs
          grep -q "const CACHE = 'chute-mundo-v5.22.0'" public/sw.js
          grep -q "chute-v522-stats-refinement.mjs?v=5.22.0" public/sw.js
          grep -q "chute-v521-history-part-" public/sw.js
          grep -q "self.clients.claim()" public/sw.js
          grep -q "fetch(request, { cache: 'no-store' })" public/sw.js
          ! grep -q "chute-v520-stats.mjs" public/sw.js
          ! grep -q "chute-v520-stats-sync.mjs" public/sw.js
          grep -q "chute-official.mjs?v=5.22.0" public/index.html
          grep -q "Chute Mundo v5.22.0 · Competición" public/index.html
          grep -q "const APP_VERSION = '5.22.0'" public/chute-bootstrap.mjs
          grep -q "resetLegacyRuntimeOnce" public/chute-bootstrap.mjs
          grep -q "registration.unregister()" public/chute-bootstrap.mjs
          grep -q "core.navigate('inicio')" public/chute-bootstrap.mjs
          grep -q "position:static!important" public/chute-v522-stats-refinement.css
          grep -q "Evolución de la Tabla Eterna" public/chute-v522-stats-refinement.mjs
          grep -q "Carloco's House" public/chute-v522-stats-refinement.mjs
          grep -q "Campeón en" public/chute-v522-stats-refinement.mjs
          grep -q "Rendimiento por competencia" public/chute-v522-stats-refinement.mjs
          grep -q "#7c3aed" public/chute-v522-stats-refinement.mjs
          grep -q "#111827" public/chute-v522-stats-refinement.mjs
          grep -q "rel=\"icon\" href=\"/chute-icon.svg\"" public/index.html

      - name: Install browser
        run: |
          npm install --no-save serve@14.2.4 playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Run browser flows
        run: |
          npx serve public -l 4173 --no-clipboard > /tmp/chute-server.log 2>&1 &
          sleep 3
          node scripts/smoke-chute-v522.mjs > /tmp/chute-smoke-v522.log 2>&1
          node scripts/smoke-chute-v516.mjs > /tmp/chute-smoke-v516.log 2>&1
          node scripts/smoke-chute-v517.mjs > /tmp/chute-smoke-v517.log 2>&1

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chute-v5-22-diagnostics
          path: |
            /tmp/chute-v516-syntax.log
            /tmp/chute-v517-syntax.log
            /tmp/chute-v518-archive-syntax.log
            /tmp/chute-v521-syntax.log
            /tmp/chute-smoke-*.log
            /tmp/chute-server.log
          retention-days: 3
