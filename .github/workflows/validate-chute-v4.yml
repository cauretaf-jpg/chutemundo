name: Validate Chute Mundo v5.6

on:
  push:
    branches:
      - feature/v5-6-disciplina-divisiones
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Reconstruct base runtime
        run: cat public/chute-official-part-*.txt > /tmp/chute-official-runtime.mjs

      - name: Validate JavaScript syntax
        run: |
          node --check /tmp/chute-official-runtime.mjs
          node --check public/chute-official-loader.mjs
          node --check public/chute-official.mjs
          node --check public/password-reset.mjs
          node --check public/chute-mutation-guard.mjs
          node --check public/chute-detail.mjs
          node --check public/chute-detail-model.mjs
          node --check public/chute-detail-ui.mjs
          node --check public/chute-detail-events.mjs
          node --check public/chute-detail-diagnostics.mjs
          node --check public/chute-group-editor.mjs
          node --check public/chute-data-hygiene.mjs
          node --check public/chute-premium-ui.mjs
          node --check public/chute-tournament-hub.mjs
          node --check public/chute-matches-v52.mjs
          node --check public/chute-stats-v52.mjs
          node --check public/chute-game-minute-stats.mjs
          node --check public/chute-v54.mjs
          node --check public/chute-v54-form-guard.mjs
          node --check public/chute-v55-event-guard.mjs
          node --check public/chute-v55.mjs
          node --check public/chute-v56-discipline.mjs
          node --check scripts/smoke-chute-v56.mjs

      - name: Validate required features
        run: |
          test -s public/index.html
          test -s public/chute-v54.mjs
          test -s public/chute-v54.css
          test -s public/chute-v55.mjs
          test -s public/chute-v55.css
          test -s public/chute-v56-discipline.mjs
          test -s public/chute-v56.css
          grep -q "division_season" public/chute-v54.mjs
          grep -q "nextComposition" public/chute-v54.mjs
          grep -q "OFFICIAL_MINUTES" public/chute-v55.mjs
          grep -q "data-cm-fixture-division" public/chute-v55.mjs
          grep -q "registrationStartedAt" public/chute-v55.mjs
          grep -q "lastVenue" public/chute-v55.mjs
          grep -q "yellowLimit: 2" public/chute-v56-discipline.mjs
          grep -q "double_yellow" public/chute-v56-discipline.mjs
          grep -q "carryBetweenSeasons" public/chute-v56-discipline.mjs
          grep -q "data-cm-v56-discipline-tab" public/chute-v56-discipline.mjs
          grep -q "SUSPENDIDO" public/chute-v56-discipline.mjs
          grep -q "cm-v56-suspension-notice" public/chute-v56.css
          grep -q '"feature/\*\*": false' vercel.json

      - name: Install browser test dependencies
        run: |
          npm install --no-save serve@14.2.4 playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Run browser smoke test
        shell: bash
        run: |
          set -o pipefail
          npx serve public -l 4173 --no-clipboard > /tmp/chute-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          sleep 3
          node scripts/smoke-chute-v56.mjs 2>&1 | tee /tmp/chute-smoke-v56.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chute-v5-6-diagnostics
          path: |
            /tmp/chute-smoke-v56.log
            /tmp/chute-server.log
          if-no-files-found: ignore
          retention-days: 3
