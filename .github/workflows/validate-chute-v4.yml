name: Validate Chute Mundo v5.2

on:
  push:
    branches:
      - feature/v4-detalle-total
      - fix/firestore-json-state
      - fix/botones-sin-respuesta
      - feature/editor-grupos-copas
      - feature/v5-estetica-deportiva
      - feature/v5-1-torneos-ordenados
      - feature/v5-2-partidos-estadisticas
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Reconstruct base runtime
        run: cat public/chute-official-part-*.txt > /tmp/chute-official-runtime.mjs

      - name: Validate JavaScript syntax
        run: |
          node --check /tmp/chute-official-runtime.mjs
          node --check public/chute-official-loader.mjs
          node --check public/chute-official.mjs
          node --check public/password-reset.mjs
          node --check public/chute-mutation-guard.mjs
          node --check public/chute-detail.mjs
          node --check public/chute-detail-model.mjs
          node --check public/chute-detail-ui.mjs
          node --check public/chute-detail-events.mjs
          node --check public/chute-detail-diagnostics.mjs
          node --check public/chute-group-editor.mjs
          node --check public/chute-data-hygiene.mjs
          node --check public/chute-premium-ui.mjs
          node --check public/chute-tournament-hub.mjs
          node --check public/chute-matches-v52.mjs
          node --check public/chute-stats-v52.mjs
          node --check scripts/smoke-chute-v5.mjs

      - name: Validate required files and Firebase encoding
        run: |
          test -s public/index.html
          test -s public/chute-official.css
          test -s public/chute-detail.css
          test -s public/chute-groups.css
          test -s public/chute-premium.css
          test -s public/chute-premium-overrides.css
          test -s public/chute-tournament-hub.css
          test -s public/chute-matches-v52.css
          test -s public/chute-stats-v52.css
          test -s public/chute-data-hygiene.mjs
          test -s public/chute-premium-ui.mjs
          test -s public/chute-tournament-hub.mjs
          test -s public/chute-matches-v52.mjs
          test -s public/chute-stats-v52.mjs
          test -s public/chute-mutation-guard.mjs
          grep -q "goals: Array.isArray(source.goals)" /tmp/chute-official-runtime.mjs
          grep -q "cards: Array.isArray(source.cards)" /tmp/chute-official-runtime.mjs
          grep -q "mergeStateHistory" /tmp/chute-official-runtime.mjs
          grep -q "typeof parsedValue === 'string'" /tmp/chute-official-runtime.mjs
          grep -q "state: serializedState" /tmp/chute-official-runtime.mjs
          grep -q "stateEncoding: 'json-v1'" /tmp/chute-official-runtime.mjs
          grep -q "data-cm-add-goal" public/chute-detail-events.mjs
          grep -q "data-cm-add-card" public/chute-detail-events.mjs
          grep -q "reorderPickerForCore" public/chute-group-editor.mjs
          grep -q "sanitizeOfficialTournament" public/chute-data-hygiene.mjs
          grep -q "cm-premium-dashboard" public/chute-premium-ui.mjs
          grep -q "cm-mobile-nav" public/chute-premium.css
          grep -q "cmTournamentHub" public/chute-tournament-hub.mjs
          grep -q "cm-hub-table" public/chute-tournament-hub.css
          grep -q "cmAdvancedMatchFilters" public/chute-matches-v52.mjs
          grep -q "RANKING FIFA CHUTE" public/chute-stats-v52.mjs
          grep -q "Álvaro" public/chute-stats-v52.mjs
          grep -q "Carlos" public/chute-stats-v52.mjs
          grep -q "cm-v52-recent-row" public/chute-matches-v52.css
          grep -q '"feature/\*\*": false' vercel.json

      - name: Install browser test dependencies
        run: |
          npm install --no-save serve@14.2.4 playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Run browser smoke test
        shell: bash
        run: |
          set -o pipefail
          npx serve public -l 4173 --no-clipboard > /tmp/chute-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          sleep 3
          node scripts/smoke-chute-v5.mjs 2>&1 | tee /tmp/chute-smoke.log

      - name: Upload visual diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chute-v5-2-diagnostics
          path: |
            /tmp/chute-smoke.log
            /tmp/chute-server.log
            /tmp/chute-v5-desktop.png
            /tmp/chute-v5-mobile.png
          if-no-files-found: ignore
          retention-days: 3
